<div id="map"
  class="h-[400px] w-[85%] mx-auto mt-6 rounded-3xl shadow-sm border border-gray-200 overflow-hidden z-0 relative">
</div>

<div #popupTemplate class="hidden" ngNonBindable>
  <div
    class="relative min-w-[200px] max-w-[240px] bg-gradient-to-b from-white to-[#fffaf7] rounded-[14px] py-3 px-3.5 border border-accent/20 shadow-[0_20px_40px_rgba(0,0,0,0.12),0_4px_12px_rgba(217,119,87,0.12)] font-body overflow-hidden">
    <div
      class="absolute top-2.5 bottom-2.5 left-2.5 w-[3px] rounded-[3px] bg-gradient-to-b from-accent to-[#E6A28B] opacity-85">
    </div>

    <div class="pl-2">
      <h3 class="text-[0.78rem] font-bold tracking-wide text-pri m-0 break-words whitespace-normal">{{title}}</h3>
    </div>
  </div>
</div>
