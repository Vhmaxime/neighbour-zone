<button [class]="
    saveState() ? '!text-blue-600 !hover:text-blue-700' : '!text-gray-500 !hover:text-blue-500'
  "
  class="flex items-center transition-colors !bg-transparent m-0! disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-200! p-2! rounded-full"
  (click)="handleSave()" [disabled]="isLoading() || readonly()" [title]="saveState() ? 'Saved' : 'Save'">
  <svg class="w-5 h-5" [class.fill-current]="saveState()" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
  </svg>
</button>
