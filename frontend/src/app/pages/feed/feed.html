<div class="max-w-2xl mx-auto py-8 px-4 font-body">
  <h1 class="text-3xl font-extrabold text-pri font-heading mb-8 text-left md:text-left">
    Latest in the Neighbourhood
  </h1>

  @if (isLoading()) {
    <app-loading-component [message]="'Loading neighbours\' activity...'" />
  } @else {
    <div class="flex flex-col gap-6 pb-24">
      @for (post of feedItems(); track post.id) {
        <app-post-tile [post]="post" (deleted)="handleItemDeleted($event)" />
      } @empty {
        <div class="text-center py-20 bg-surface border-2 border-dashed border-gray-100 rounded-[20px]">
          <p class="text-sec font-medium">Nothing new happening today.</p>
        </div>
      }
    </div>
  }
</div>

<app-create-post-button />
